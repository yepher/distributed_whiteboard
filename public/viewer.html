<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard — Viewer</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="viewer theme-dark">

  <!-- Main canvas area (full screen for viewer) -->
  <main id="canvas-area" class="viewer-canvas">
    <canvas id="whiteboard"></canvas>
  </main>

  <!-- Board indicator -->
  <div id="board-indicator">Board 1</div>

  <!-- Fullscreen button -->
  <button id="btn-fullscreen" class="fullscreen-btn" title="Full screen">
    <svg class="icon-expand" viewBox="0 0 24 24" width="24" height="24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
    <svg class="icon-compress" viewBox="0 0 24 24" width="24" height="24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" fill="currentColor"/></svg>
  </button>

  <!-- Connection status -->
  <div id="connection-status" class="disconnected">Connecting...</div>

  <script src="/js/whiteboard.js"></script>
  <script src="/js/viewer.js"></script>
</body>
</html>
