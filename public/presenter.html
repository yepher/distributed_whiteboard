<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Whiteboard — Presenter</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="presenter theme-dark">

  <!-- Left sidebar: board thumbnails -->
  <aside id="sidebar">
    <div id="board-list"></div>
    <button id="add-board" title="Add board">+</button>
  </aside>

  <!-- Main canvas area -->
  <main id="canvas-area">
    <canvas id="whiteboard"></canvas>
  </main>

  <!-- Bottom toolbar -->
  <footer id="toolbar">
    <div class="tool-group" id="history-group">
      <button id="btn-undo" class="tool-btn" title="Undo">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12.5 8C9.85 8 7.45 9 5.6 10.6L2 7v9h9l-3.6-3.6C8.9 11.1 10.6 10.5 12.5 10.5c3.5 0 6.5 2.3 7.5 5.5l2.2-.8C20.8 11.2 17 8 12.5 8z" fill="currentColor"/></svg>
      </button>
      <button id="btn-redo" class="tool-btn" title="Redo">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M11.5 8c2.65 0 5.05 1 6.9 2.6L22 7v9h-9l3.6-3.6C15.1 11.1 13.4 10.5 11.5 10.5c-3.5 0-6.5 2.3-7.5 5.5L1.8 15.2C3.2 11.2 7 8 11.5 8z" fill="currentColor"/></svg>
      </button>
      <button id="btn-replay" class="tool-btn present-btn" title="Present / Replay drawing">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 9.27l4.11 2.73L10 14.73V9.27M8 5v14l11-7L8 5z" fill="currentColor"/></svg>
        <span>Present</span>
      </button>
    </div>

    <div class="tool-group" id="tools-group">
      <button class="tool-btn" data-tool="select" title="Select / Move">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4L7 18.5V2z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn active" data-tool="pen" title="Pen">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="marker" title="Marker">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="highlighter" title="Highlighter">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M11 21h-1l-7-7 3-3 5 5V21zm6.71-14.71l-3-3a1 1 0 00-1.42 0L10 6.59l7.41 7.41 2.3-2.29a1 1 0 000-1.42z" fill="currentColor" opacity="0.6"/></svg>
      </button>
      <button class="tool-btn" data-tool="eraser" title="Eraser">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73a2 2 0 000 2.83l2.83 2.83A2 2 0 007 20.93h5.17a2 2 0 001.42-.59l7.82-7.82a2 2 0 000-2.83l-4.86-4.86A2 2 0 0015.14 3zM7 18.93l-2.83-2.83L10.59 9.68l5.66 5.66-3.41 3.41H7.17z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="Text">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M5 4v3h5.5v12h3V7H19V4H5z" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="tool-group" id="size-group">
      <input type="range" id="line-width" min="1" max="20" value="3" title="Line width">
    </div>

    <div class="tool-group" id="colors-group">
      <div class="color-picker">
        <button id="color-current" class="color-current" style="background:#1FD5F9" title="Color"></button>
        <div id="color-palette" class="color-palette">
          <button class="color-btn active" data-color="#1FD5F9" style="background:#1FD5F9" title="LK Cyan"></button>
          <button class="color-btn" data-color="#002CF2" style="background:#002CF2" title="LK Blue"></button>
          <button class="color-btn" data-color="#ffffff" style="background:#ffffff" title="White"></button>
          <button class="color-btn" data-color="#ef4444" style="background:#ef4444" title="Red"></button>
          <button class="color-btn" data-color="#22c55e" style="background:#22c55e" title="Green"></button>
          <button class="color-btn" data-color="#eab308" style="background:#eab308" title="Yellow"></button>
          <button class="color-btn" data-color="#f97316" style="background:#f97316" title="Orange"></button>
          <button class="color-btn" data-color="#a855f7" style="background:#a855f7" title="Purple"></button>
        </div>
      </div>
    </div>

    <div class="tool-group" id="actions-group">
      <button id="btn-clear" class="tool-btn" title="Clear board">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
      </button>
      <button id="btn-theme" class="tool-btn" title="Toggle dark/light">
        <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 01-4.4 2.26 5.4 5.4 0 01-3.14-9.8A9.06 9.06 0 0012 3z" fill="currentColor"/></svg>
      </button>
      <button id="btn-fullscreen" class="tool-btn" title="Full screen">
        <svg class="icon-expand" viewBox="0 0 24 24" width="24" height="24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
        <svg class="icon-compress" viewBox="0 0 24 24" width="24" height="24" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" fill="currentColor"/></svg>
      </button>
      <div class="download-group">
        <button id="btn-download" class="tool-btn" title="Download">
          <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/></svg>
        </button>
        <div id="download-menu" class="download-menu">
          <button data-format="svg">SVG (current board)</button>
          <button data-format="pdf">PDF (all boards)</button>
          <button data-format="json">JSON (backup)</button>
          <div class="download-menu-divider"></div>
          <button data-format="load">Load from file...</button>
        </div>
        <input type="file" id="file-load" accept=".pdf,.json" style="display:none">
      </div>
    </div>
  </footer>

  <!-- Playback bar (shown during replay) -->
  <footer id="playback-bar" class="hidden">
    <div class="pb-group">
      <button id="pb-start" class="pb-btn" title="Back to start">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/></svg>
      </button>
      <button id="pb-step-back" class="pb-btn" title="Step back">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" fill="currentColor"/></svg>
      </button>
      <button id="pb-pause" class="pb-btn pb-primary" title="Pause / Play">
        <svg class="icon-pause" viewBox="0 0 24 24" width="24" height="24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
        <svg class="icon-play" viewBox="0 0 24 24" width="24" height="24" style="display:none"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
      </button>
      <button id="pb-step-fwd" class="pb-btn" title="Step forward">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" fill="currentColor"/></svg>
      </button>
      <button id="pb-end" class="pb-btn" title="Skip to end">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 18l8.5-6L4 6v12zm9 0h2V6h-2v12z" fill="currentColor" transform="translate(2,0)"/></svg>
      </button>
    </div>
    <div class="pb-group pb-speed">
      <button class="pb-speed-btn" data-speed="0.5">0.5x</button>
      <button class="pb-speed-btn active" data-speed="1">1x</button>
      <button class="pb-speed-btn" data-speed="2">2x</button>
      <button class="pb-speed-btn" data-speed="4">4x</button>
    </div>
    <div class="pb-group">
      <button id="pb-cancel" class="pb-btn pb-cancel" title="Cancel replay">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/></svg>
        Cancel
      </button>
    </div>
  </footer>

  <!-- Session bar -->
  <div id="session-bar">
    <span id="session-id" class="session-id"></span>
    <span id="viewer-count" class="viewer-count" title="Connected viewers">0 viewers</span>
    <button id="btn-sync" class="sync-btn" title="Force sync viewers">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z" fill="currentColor"/></svg>
      Sync
    </button>
    <button id="btn-share" class="share-btn" title="Copy viewer link">
      <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z" fill="currentColor"/></svg>
      Share
    </button>
  </div>

  <!-- Toast notification -->
  <div id="share-toast" class="toast"></div>

  <!-- Connection status -->
  <div id="connection-status" class="disconnected">Connecting...</div>

  <script src="/js/whiteboard.js"></script>
  <script src="/js/presenter.js"></script>
</body>
</html>
