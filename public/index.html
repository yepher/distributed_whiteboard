<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributed Whiteboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070707;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 15px;
      color: #888;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 12px;
    }

    .btn-new {
      display: block;
      width: 100%;
      padding: 14px 24px;
      background: #1FD5F9;
      color: #070707;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-new:hover {
      background: #17b8d8;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: #555;
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }

    .join-form {
      display: flex;
      gap: 8px;
    }

    .join-input {
      flex: 1;
      padding: 12px 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e5e5e5;
      font-size: 15px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }

    .join-input::placeholder {
      color: #555;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    .join-input:focus {
      border-color: #1FD5F9;
    }

    .btn-join {
      padding: 12px 20px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e5e5e5;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-join:hover {
      border-color: #1FD5F9;
      color: #1FD5F9;
    }

    .role-toggle {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 3px;
    }

    .role-btn {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #888;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .role-btn.active {
      background: #333;
      color: #fff;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Distributed Whiteboard</h1>
    <p class="subtitle">Real-time collaborative whiteboard for presentations and training</p>

    <div class="section">
      <button class="btn-new" id="btn-new">Start New Session</button>
    </div>

    <div class="divider">or join existing</div>

    <div class="section">
      <div class="role-toggle">
        <button class="role-btn active" data-role="viewer">Viewer</button>
        <button class="role-btn" data-role="presenter">Presenter</button>
      </div>
      <div class="join-form">
        <input type="text" class="join-input" id="session-input" placeholder="Session ID" autocomplete="off" spellcheck="false">
        <button class="btn-join" id="btn-join">Join</button>
      </div>
      <p class="error" id="error-msg">Please enter a session ID</p>
    </div>
  </div>

  <script>
    let selectedRole = 'viewer';

    // Role toggle
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
      });
    });

    // New session
    document.getElementById('btn-new').addEventListener('click', () => {
      window.location.href = '/presenter';
    });

    // Join existing
    document.getElementById('btn-join').addEventListener('click', join);
    document.getElementById('session-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') join();
      document.getElementById('error-msg').style.display = 'none';
    });

    function join() {
      const input = document.getElementById('session-input');
      const errorEl = document.getElementById('error-msg');
      const sessionId = input.value.trim();

      if (!sessionId) {
        errorEl.textContent = 'Please enter a session ID';
        errorEl.style.display = 'block';
        return;
      }

      window.location.href = `/${selectedRole}?session=${encodeURIComponent(sessionId)}`;
    }

    // Auto-focus input
    document.getElementById('session-input').focus();
  </script>
</body>
</html>
